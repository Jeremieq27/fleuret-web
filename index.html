<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleuret — Trade plants with people nearby</title>
  <meta name="description" content="Fleuret helps you trade plants with growers in your neighbourhood." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1a0f;
      color: #d4cfc8;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 48px; color: #e8e3da; margin-bottom: 12px; }
    p  { font-size: 18px; color: #7a9e7e; max-width: 360px; line-height: 1.6; margin-bottom: 32px; }
    a {
      background: #8f6fb3;
      color: #e8e3da;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 16px;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Fleuret</h1>
  <p>Trade plants with growers in your neighbourhood.</p>
  <a href="https://apps.apple.com/app/fleuret/id6764794651">Download on the App Store</a>
</body>
</html>
